<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPIC System Feature Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --surface2: #f0eeeb;
      --border: rgba(0,0,0,0.09);
      --border2: rgba(0,0,0,0.15);
      --text: #1a1a1a;
      --text2: #555;
      --text3: #999;
      --blue-bg: #e8f0fb;
      --blue-text: #1a4fa0;
      --blue-border: rgba(26,79,160,0.2);
      --green-bg: #e6f4ea;
      --green-text: #1e6b3c;
      --green-border: rgba(30,107,60,0.2);
      --amber-bg: #fef8e7;
      --amber-text: #7a5a00;
      --amber-border: rgba(200,150,0,0.25);
      --red-bg: #fdecea;
      --red-text: #a01a1a;
      --red-border: rgba(160,26,26,0.2);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container { width: 100%; max-width: 800px; }

    /* HEADER */
    .app-header { margin-bottom: 2rem; }
    .app-eyebrow {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
      margin-bottom: 0.35rem;
    }
    .app-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: var(--text);
      margin-bottom: 0.3rem;
      line-height: 1.2;
    }
    .app-sub { font-size: 14px; color: var(--text2); font-weight: 300; }

    /* TAB NAV */
    .tab-nav {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .tab-btn {
      flex: 1;
      min-width: 100px;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      font-weight: 400;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .tab-btn:hover { background: var(--surface2); color: var(--text); }
    .tab-btn.active { background: var(--text); color: #fff; font-weight: 500; }

    /* FEATURE GRID */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .feat-btn {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 1.1rem 0.75rem 0.9rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .feat-btn:hover { border-color: var(--border2); background: var(--surface2); }
    .feat-btn.active-blue  { border: 1.5px solid var(--blue-border);  background: var(--blue-bg); }
    .feat-btn.active-green { border: 1.5px solid var(--green-border); background: var(--green-bg); }
    .feat-btn.active-amber { border: 1.5px solid var(--amber-border); background: var(--amber-bg); }
    .feat-btn.active-red   { border: 1.5px solid var(--red-border);   background: var(--red-bg); }

    .feat-icon-wrap {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 0.6rem;
    }
    .feat-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .feat-btn.active-blue  .feat-name { color: var(--blue-text); }
    .feat-btn.active-green .feat-name { color: var(--green-text); }
    .feat-btn.active-amber .feat-name { color: var(--amber-text); }
    .feat-btn.active-red   .feat-name { color: var(--red-text); }

    /* DETAIL PANEL */
    .detail-panel {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
    }
    .detail-panel.visible { display: block; }

    .detail-header {
      display: flex; align-items: center; gap: 14px;
      padding: 1.25rem 1.5rem;
      border-bottom: 0.5px solid var(--border);
    }
    .detail-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .detail-title { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
    .detail-tag {
      font-size: 11px;
      color: var(--text2);
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      border-radius: 20px;
      padding: 2px 10px;
      display: inline-block;
      font-weight: 400;
    }

    .detail-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    @media (max-width: 560px) { .detail-body { grid-template-columns: 1fr; } }

    .detail-section {
      padding: 1.1rem 1.5rem;
      border-bottom: 0.5px solid var(--border);
    }
    .detail-section:nth-child(odd) { border-right: 0.5px solid var(--border); }
    .detail-section.full { grid-column: 1 / -1; }
    .detail-section:last-child { border-bottom: none; }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin-bottom: 0.6rem;
    }
    .detail-desc { font-size: 14px; color: var(--text); line-height: 1.7; }

    .use-list { list-style: none; padding: 0; }
    .use-list li {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.55;
      padding: 0.35rem 0;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .use-list li:last-child { border-bottom: none; }
    .use-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }

    /* TROUBLESHOOTING */
    .trouble-list { list-style: none; padding: 0; }
    .trouble-item {
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .trouble-q {
      width: 100%;
      background: var(--surface2);
      border: none;
      padding: 0.75rem 1rem;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .trouble-q:hover { background: var(--border); }
    .trouble-q.open { background: var(--surface); border-bottom: 0.5px solid var(--border); }
    .trouble-chevron {
      width: 16px; height: 16px;
      flex-shrink: 0;
      transition: transform 0.2s;
      color: var(--text3);
    }
    .trouble-q.open .trouble-chevron { transform: rotate(180deg); }
    .trouble-a {
      display: none;
      padding: 0.85rem 1rem;
      font-size: 13px;
      color: var(--text2);
      line-height: 1.7;
      background: var(--surface);
    }
    .trouble-a.open { display: block; }
    .trouble-a strong { color: var(--text); font-weight: 500; }
    .trouble-steps { margin: 0.5rem 0 0; padding-left: 1.2rem; }
    .trouble-steps li { margin-bottom: 0.3rem; }
    .severity {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .sev-quick { background: var(--green-bg); color: var(--green-text); }
    .sev-check { background: var(--amber-bg); color: var(--amber-text); }
    .sev-it    { background: var(--red-bg);   color: var(--red-text); }

    /* TIP BOX */
    .tip-box {
      background: var(--amber-bg);
      border-left: 3px solid var(--amber-text);
      padding: 0.75rem 1rem;
      font-size: 13px;
      line-height: 1.65;
    }
    .tip-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--amber-text);
      margin-bottom: 0.25rem;
    }
    .tip-text { color: var(--text); }

    /* WHO BADGES */
    .who-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .who-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--green-bg);
      color: var(--green-text);
      border: 0.5px solid var(--green-border);
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text3);
      font-size: 14px;
      font-style: italic;
    }
    .empty-arrow { font-size: 20px; margin-bottom: 0.5rem; color: var(--text3); }

    /* TABS CONTENT */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* TROUBLE FEATURE FILTER */
    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .filter-pill {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 0.5px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .filter-pill:hover { background: var(--surface2); }
    .filter-pill.active { background: var(--text); color: #fff; border-color: var(--text); }
  </style>
</head>
<body>
<div class="container">

  <div class="app-header">
    <div class="app-eyebrow">Audio Enhancement</div>
    <div class="app-title">EPIC System Explorer</div>
    <div class="app-sub">Interactive guide to features and troubleshooting for all staff</div>
  </div>

  <!-- TAB NAV -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('features', this)">Features</button>
    <button class="tab-btn" onclick="switchTab('troubleshooting', this)">Troubleshooting</button>
  </div>

  <!-- FEATURES TAB -->
  <div class="tab-content active" id="tab-features">
    <div class="feature-grid">
      <button class="feat-btn" onclick="showFeature('intercom')" id="btn-intercom">
        <div class="feat-icon-wrap" style="background:var(--blue-bg)">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="5.5" r="2.5" stroke="#1a4fa0" stroke-width="1.2"/>
            <path d="M2 14c0-3 2.7-4.5 6-4.5s6 1.5 6 4.5" stroke="#1a4fa0" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="feat-name">Intercom</div>
      </button>
      <button class="feat-btn" onclick="showFeature('paging')" id="btn-paging">
        <div class="feat-icon-wrap" style="background:var(--green-bg)">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
            <path d="M1 5l6-3 6 3v7a1 1 0 01-1 1H2a1 1 0 01-1-1V5z" stroke="#1e6b3c" stroke-width="1.2"/>
            <path d="M5 13V8h6v5" stroke="#1e6b3c" stroke-width="1.2"/>
          </svg>
        </div>
        <div class="feat-name">Paging</div>
      </button>
      <button class="feat-btn" onclick="showFeature('bells')" id="btn-bells">
        <div class="feat-icon-wrap" style="background:var(--amber-bg)">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
            <path d="M8 2a4 4 0 014 4v3l1 1v1H3v-1l1-1V6a4 4 0 014-4z" stroke="#7a5a00" stroke-width="1.2"/>
            <path d="M6.5 13a1.5 1.5 0 003 0" stroke="#7a5a00" stroke-width="1.2"/>
          </svg>
        </div>
        <div class="feat-name">Bells</div>
      </button>
      <button class="feat-btn" onclick="showFeature('visual')" id="btn-visual">
        <div class="feat-icon-wrap" style="background:var(--red-bg)">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="14" height="9" rx="1.5" stroke="#a01a1a" stroke-width="1.2"/>
            <path d="M4 7h8M4 10h5" stroke="#a01a1a" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="feat-name">Visual messaging</div>
      </button>
    </div>

    <div class="detail-panel" id="detail-panel">
      <div class="empty-state">
        <div class="empty-arrow">↑</div>
        Select a feature above to explore it
      </div>
    </div>
  </div>

  <!-- TROUBLESHOOTING TAB -->
  <div class="tab-content" id="tab-troubleshooting">
    <div class="filter-row">
      <button class="filter-pill active" onclick="filterTrouble('all', this)">All issues</button>
      <button class="filter-pill" onclick="filterTrouble('intercom', this)">Intercom</button>
      <button class="filter-pill" onclick="filterTrouble('paging', this)">Paging</button>
      <button class="filter-pill" onclick="filterTrouble('bells', this)">Bells</button>
      <button class="filter-pill" onclick="filterTrouble('visual', this)">Visual messaging</button>
    </div>
    <ul class="trouble-list" id="trouble-list"></ul>
  </div>

</div>

<script>
var features = {
  intercom: {
    name: "Intercom",
    tag: "Two-way audio communication",
    color: "blue",
    iconSvg: '<svg width="20" height="20" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="#1a4fa0" stroke-width="1.2"/><path d="M2 14c0-3 2.7-4.5 6-4.5s6 1.5 6 4.5" stroke="#1a4fa0" stroke-width="1.2" stroke-linecap="round"/></svg>',
    iconBg: "var(--blue-bg)",
    desc: "EPIC Intercom enables full-duplex, hands-free two-way audio between the front office and any classroom or addressable location on campus. Communication is direct and immediate — no phone lines needed. Staff can initiate a conversation from the EPIC Kiosk, web browser, or mobile app.",
    uses: [
      "Office staff need to reach a specific classroom without disrupting the whole school",
      "A teacher needs to speak directly with the front office",
      "Confirming a student pickup with a specific room"
    ],
    tip: "Intercom is point-to-point — it connects two specific locations. For messages that need to reach multiple rooms at once, use Paging instead.",
    who: ["Office staff", "Administrators", "Teachers"]
  },
  paging: {
    name: "Paging",
    tag: "Scheduled and targeted announcements",
    color: "green",
    iconSvg: '<svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M1 5l6-3 6 3v7a1 1 0 01-1 1H2a1 1 0 01-1-1V5z" stroke="#1e6b3c" stroke-width="1.2"/><path d="M5 13V8h6v5" stroke="#1e6b3c" stroke-width="1.2"/></svg>',
    iconBg: "var(--green-bg)",
    desc: "Paging allows authorized staff to broadcast audio announcements to the entire campus or to selected zones — such as just hallways, one wing, or only outdoor speakers. Announcements can be delivered live or pre-recorded and scheduled in advance.",
    uses: [
      "A lunch reminder broadcast to the cafeteria and hallways only",
      "A pre-recorded safety reminder scheduled to play at a set time daily",
      "Targeted messages to specific grade-level wings without interrupting other classes"
    ],
    tip: "You can page from the EPIC Kiosk, a web browser, or the mobile app — so you're never tied to one location to make an announcement.",
    who: ["Office staff", "Administrators", "Front office coordinators"]
  },
  bells: {
    name: "Bells",
    tag: "Customizable bell scheduling",
    color: "amber",
    iconSvg: '<svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M8 2a4 4 0 014 4v3l1 1v1H3v-1l1-1V6a4 4 0 014-4z" stroke="#7a5a00" stroke-width="1.2"/><path d="M6.5 13a1.5 1.5 0 003 0" stroke="#7a5a00" stroke-width="1.2"/></svg>',
    iconBg: "var(--amber-bg)",
    desc: "EPIC System's bell scheduler lets authorized personnel create and manage fully customizable bell schedules. You can set different schedules for different days, pre-record custom audio alerts, and make real-time changes from any authorized device — no technical expertise required.",
    uses: [
      "Setting up a modified schedule for minimum days or special events",
      "Creating a separate schedule for testing days with longer periods",
      "Switching to a different schedule on the fly the morning of an unexpected change",
      "Using a custom audio tone or recorded message instead of a standard bell sound",
      "Ringing or excluding bells from specific zones"
    ],
    tip: "Schedule changes can be made in real time from any authorized device — you don't need to be at the EPIC Kiosk to update the bell schedule mid-day.",
    who: ["Administrators", "Office managers", "IT coordinators"]
  },
  visual: {
    name: "Visual messaging",
    tag: "Screen-based alerts and notifications",
    color: "red",
    iconSvg: '<svg width="20" height="20" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="9" rx="1.5" stroke="#a01a1a" stroke-width="1.2"/><path d="M4 7h8M4 10h5" stroke="#a01a1a" stroke-width="1.2" stroke-linecap="round"/></svg>',
    iconBg: "var(--red-bg)",
    desc: "Visual Messaging broadcasts text and graphic alerts to InfoView displays throughout campus — in hallways, classrooms, and common areas. Messages can be sent school-wide or targeted to specific locations, and appear silently on screens without interrupting audio instruction.",
    uses: [
      "Displaying a lockdown or emergency alert across all campus screens instantly",
      "Sending a silent reminder to specific classrooms (e.g. 'Assembly in 10 min')",
      "Broadcasting event information to lobby and hallway displays",
      "Reinforcing an audio page with a visible on-screen message simultaneously"
    ],
    tip: "Visual Messaging is especially powerful during emergencies — it delivers critical information silently and simultaneously to every display on campus without disrupting audio.",
    who: ["Administrators", "Office staff", "Safety coordinators", "All staff"]
  }
};

var troubles = [
  { feature: "intercom", q: "No audio during an intercom call — both sides can't hear each other", sev: "quick", a: "This is almost always a volume or connection issue.", steps: ["Check that the speaker volume on both ends is turned up.", "Confirm neither device is muted at the hardware level.", "Verify the call was actually connected — look for the active call indicator in EPIC.", "If using a headset or external speaker, check the cable connection.", "Try initiating the call again from the other end."] },
  { feature: "intercom", q: "Intercom call connects but audio is one-way only", sev: "check", a: "One-way audio usually points to a microphone issue on the silent end.", steps: ["Check that the microphone on the non-transmitting device is not muted.", "If using the EPIC Kiosk, confirm the built-in mic is not blocked or disabled in settings.", "Test by initiating a call from the affected device to a known working device.", "If the issue persists on one specific room only, that room's hardware may need inspection — contact IT."] },
  { feature: "intercom", q: "Can't find a specific room or location in the intercom directory", sev: "check", a: "The room may not be added to the EPIC directory, or may be listed under a different name.", steps: ["Search by room number — the listing may use the room number or a custom label.", "Check with your EPIC administrator — the location may need to be added.", "Verify the device in that room is powered on and connected to the network."] },
  { feature: "paging", q: "Page goes out but some rooms don't receive it", sev: "check", a: "The most common cause is incorrect zone selection or a device that is offline.", steps: ["Confirm the zones selected for the page include the rooms that missed it.", "Check whether the missing rooms are in a different zone than expected.", "If a whole zone is missing, that zone's network connection may need to be checked by IT."] },
  { feature: "paging", q: "Pre-recorded announcement plays at the wrong time", sev: "quick", a: "This is typically a schedule or time zone configuration issue.", steps: ["Open the EPIC scheduling panel and confirm the announcement time is set correctly.", "Check that the EPIC Appliance clock is set to the correct local time zone.", "Confirm AM/PM is correct — this is a common entry error.", "If the schedule looks correct but timing is still off, contact IT to verify the server clock."] },
  { feature: "paging", q: "Live page audio sounds distorted or has feedback", sev: "quick", a: "Feedback during a live page is usually caused by nearby speakers picking up the microphone.", steps: ["Move away from any active speakers while paging.", "Lower the microphone input sensitivity in EPIC audio settings if available.", "If using the Kiosk, ensure you are speaking directly into the mic at a normal volume.", "Persistent distortion on a specific zone may indicate a hardware issue — log it with IT."] },
  { feature: "bells", q: "Bells are not ringing at the correct times", sev: "check", a: "The most likely cause is the wrong schedule being active for today.", steps: ["Open the EPIC bell scheduler and confirm which schedule is currently active.", "Check whether a special schedule (minimum day, testing) was left active by mistake.", "Verify the EPIC Appliance time and time zone are correct.", "Confirm today's date in the system — a date mismatch can trigger the wrong schedule."] },
  { feature: "bells", q: "Bell rings but uses the wrong audio tone", sev: "quick", a: "A different audio file may be assigned to this bell event.", steps: ["Open the bell event in the scheduler and check which audio file is assigned.", "Preview the assigned audio to confirm it is the correct file.", "Re-assign the correct audio file if needed and save the schedule.", "If the correct file is missing from the library, re-upload it under EPIC audio management."] },
  { feature: "bells", q: "Need to temporarily suspend bells for an event or testing day", sev: "quick", a: "EPIC allows you to override or pause the bell schedule without deleting it.", steps: ["Navigate to the bell scheduler and select today's schedule.", "Use the 'override' or 'suspend' option to pause bells for a time range.", "Remember to re-activate the regular schedule when the event is over."] },
  { feature: "visual", q: "Message sent but not showing on InfoView displays", sev: "check", a: "The display may be offline, the message may be targeting the wrong zone, or the display needs a refresh.", steps: ["Confirm the InfoView display is powered on and the screen is active (not in sleep mode).", "Check that the message was sent to the correct zone or display group.", "Refresh the InfoView display from the EPIC admin panel.", "If a specific display is consistently unresponsive, check its network connection or contact IT."] },
  { feature: "visual", q: "Emergency alert sent but display shows outdated message", sev: "it", a: "Emergency alerts should override all existing content — if they are not, this needs immediate IT attention.", steps: ["Verify the message was sent using the emergency/priority alert option, not a standard message.", "Check the EPIC alert log to confirm the message was transmitted successfully.", "If the display is still showing old content, the InfoView Interface may have lost its network connection.", "Contact IT immediately if emergency alerts are not displaying correctly — do not rely on the system until resolved."] },
  { feature: "visual", q: "Text on InfoView display is cut off or not formatted correctly", sev: "quick", a: "The message content may be too long for the display template being used.", steps: ["Preview the message in EPIC before sending to check how it renders.", "Shorten the message text or use a template designed for longer content.", "Check the font size setting — very small text may not be legible at a distance.", "If using a custom layout, verify it is compatible with the InfoView Display model on campus."] }
];

function showFeature(id) {
  var f = features[id];
  var colorMap = { blue: 'active-blue', green: 'active-green', amber: 'active-amber', red: 'active-red' };

  document.querySelectorAll('.feat-btn').forEach(function(b) {
    b.className = 'feat-btn';
  });
  document.getElementById('btn-' + id).className = 'feat-btn ' + colorMap[f.color];

  var dotColor = { blue: '#1a4fa0', green: '#1e6b3c', amber: '#7a5a00', red: '#a01a1a' }[f.color];

  var usesHtml = f.uses.map(function(u) {
    return '<li><span class="use-dot" style="background:' + dotColor + '"></span>' + u + '</li>';
  }).join('');

  var whoHtml = f.who.map(function(w) {
    return '<span class="who-badge">' + w + '</span>';
  }).join('');

  var panel = document.getElementById('detail-panel');
  panel.innerHTML =
    '<div class="detail-header">' +
      '<div class="detail-icon" style="background:' + f.iconBg + '">' + f.iconSvg + '</div>' +
      '<div>' +
        '<div class="detail-title">' + f.name + '</div>' +
        '<span class="detail-tag">' + f.tag + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="detail-body">' +
      '<div class="detail-section">' +
        '<div class="section-label">What it does</div>' +
        '<p class="detail-desc">' + f.desc + '</p>' +
      '</div>' +
      '<div class="detail-section">' +
        '<div class="section-label">When to use it</div>' +
        '<ul class="use-list">' + usesHtml + '</ul>' +
      '</div>' +
      '<div class="detail-section full" style="padding:0">' +
        '<div class="tip-box">' +
          '<div class="tip-label">Pro tip</div>' +
          '<p class="tip-text">' + f.tip + '</p>' +
        '</div>' +
      '</div>' +
      '<div class="detail-section full">' +
        '<div class="section-label">Who uses this</div>' +
        '<div class="who-row">' + whoHtml + '</div>' +
      '</div>' +
    '</div>';

  panel.classList.add('visible');
}

function renderTroubles(filter) {
  var list = document.getElementById('trouble-list');
  list.innerHTML = '';
  var filtered = filter === 'all' ? troubles : troubles.filter(function(t) { return t.feature === filter; });
  var sevLabel = { quick: 'Quick fix', check: 'Check settings', it: 'Contact IT' };

  filtered.forEach(function(t, i) {
    var stepsHtml = t.steps.map(function(s) { return '<li>' + s + '</li>'; }).join('');
    var li = document.createElement('li');
    li.className = 'trouble-item';
    li.dataset.feature = t.feature;
    li.innerHTML =
      '<button class="trouble-q" onclick="toggleTrouble(this)">' +
        '<span>' + t.q + '</span>' +
        '<span style="display:flex;align-items:center;gap:6px;flex-shrink:0">' +
          '<span class="severity sev-' + t.sev + '">' + sevLabel[t.sev] + '</span>' +
          '<svg class="trouble-chevron" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>' +
        '</span>' +
      '</button>' +
      '<div class="trouble-a">' +
        '<p>' + t.a + '</p>' +
        '<ol class="trouble-steps">' + stepsHtml + '</ol>' +
      '</div>';
    list.appendChild(li);
  });
}

function toggleTrouble(btn) {
  var answer = btn.nextElementSibling;
  var isOpen = btn.classList.contains('open');
  document.querySelectorAll('.trouble-q.open').forEach(function(b) {
    b.classList.remove('open');
    b.nextElementSibling.classList.remove('open');
  });
  if (!isOpen) {
    btn.classList.add('open');
    answer.classList.add('open');
  }
}

function filterTrouble(val, btn) {
  document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  renderTroubles(val);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

window.onload = function() { renderTroubles('all'); };
</script>
</body>
</html>
